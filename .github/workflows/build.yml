name: Build & Release

on:
  push:
    branches: [main, master, 'claude/**']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Build (release)
        run: cargo build --release

      - name: Install NSIS
        run: choco install nsis -y

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $version = (cargo metadata --no-deps --format-version 1 | ConvertFrom-Json).packages[0].version
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Check if release needed
        id: check
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        shell: bash
        run: |
          VERSION="v${{ steps.version.outputs.VERSION }}"
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "SKIP=true" >> "$GITHUB_OUTPUT"
            echo "Tag $VERSION already exists, skipping release"
          else
            echo "SKIP=false" >> "$GITHUB_OUTPUT"
            echo "Will create release $VERSION"
          fi

      - name: Build installer
        shell: pwsh
        run: |
          Copy-Item "target\release\duper-disper.exe" "installer\duper-disper.exe" -Force
          & "C:\Program Files (x86)\NSIS\makensis.exe" /DVERSION=${{ steps.version.outputs.VERSION }} installer\duper-disper.nsi
          mkdir -p installer\output
          Move-Item "installer\duper-disper-setup.exe" "installer\output\duper-disper-${{ steps.version.outputs.VERSION }}-setup.exe"

      - name: Create portable ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path "target\release\duper-disper.exe" -DestinationPath "installer\output\duper-disper-${{ steps.version.outputs.VERSION }}-portable.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: duper-disper-windows
          path: installer/output/*

      # Auto-tag and release when merged to main, if version is new
      - name: Create GitHub Release
        if: |
          (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
          steps.check.outputs.SKIP == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          files: installer/output/*
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
