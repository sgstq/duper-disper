name: Build & Release

on:
  push:
    branches: [main, master, 'claude/**']
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: windows-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: windows-cargo-

      - name: Build (release)
        run: cargo build --release

      - name: Install NSIS
        run: choco install nsis -y

      - name: Get version
        id: version
        shell: pwsh
        run: |
          $version = (cargo metadata --no-deps --format-version 1 | ConvertFrom-Json).packages[0].version
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Build installer
        shell: pwsh
        run: |
          Copy-Item "target\release\duper-disper.exe" "installer\duper-disper.exe" -Force
          & "C:\Program Files (x86)\NSIS\makensis.exe" /DVERSION=${{ steps.version.outputs.VERSION }} installer\duper-disper.nsi
          mkdir -p installer\output
          Move-Item "installer\duper-disper-setup.exe" "installer\output\duper-disper-${{ steps.version.outputs.VERSION }}-setup.exe"

      - name: Create portable ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path "target\release\duper-disper.exe" -DestinationPath "installer\output\duper-disper-${{ steps.version.outputs.VERSION }}-portable.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: duper-disper-windows
          path: installer/output/*

      # Create or update the GitHub Release directly from the build job
      # This avoids a separate job that can fail if artifacts aren't ready
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: installer/output/*
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
